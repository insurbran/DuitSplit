<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DuitSplit</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="../static/css/style.css">
</head>

<body>
    <div class="container py-5">

        <div class="text-center mb-5">
            <div class="display-2">💳</div>

            <h1 class="fw-bold mt-2">DuitSplit</h1>

            <p class="lead text-muted">
                AI Powered Receipt Bill Splitter
            </p>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h4 class="card-title">📷 Upload Receipt</h4>
                <p class="text-muted">Choose a receipt photo to start the bill split.</p>

                <input type="file" id="receiptInput" class="form-control" accept="image/*">

                <div class="mt-3">
                    <img id="receiptPreview" class="receipt-preview d-none" alt="Receipt preview">
                </div>

                <button class="btn btn-primary mt-3" id="processReceiptBtn">
                    Process Receipt
                </button>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h4 class="card-title">🤖 AI Status</h4>

                <p class="text-success mb-0" id="aiStatus">
                    Ready to process receipt.
                </p>
            </div>
        </div>

        <div class="card shadow-sm mb-4 d-none" id="itemsSection">
            <div class="card-body">
                <h4 class="card-title">🧾 Extracted Items</h4>
                <p class="text-muted">These are mock items for now. Later, Gemini OCR will replace this.</p>

                <div id="itemsList"></div>
            </div>
        </div>

        <div class="card shadow-sm mb-4 d-none" id="friendsSection">
            <div class="card-body">
                <h4 class="card-title">👥 Friends</h4>

                <div class="input-group mb-3">
                    <input type="text" id="friendNameInput" class="form-control" placeholder="Enter friend name">
                    <button class="btn btn-success" id="addFriendBtn">Add Friend</button>
                </div>

                <div id="friendsList"></div>
            </div>
        </div>

        <div class="card shadow-sm mb-4 d-none" id="summarySection">
            <div class="card-body">
                <h4 class="card-title">💰 Bill Summary</h4>
                <div id="summaryList"></div>
            </div>
        </div>

    </div>

    <script src="../static/js/app.js"></script>
</body>
</html>
